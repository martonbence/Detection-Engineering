title: BITS Job abuse via BITSAdmin or PowerShell
detect_id: DETECT-2026-0005
status: test
description: Detects suspicious use of the Background Intelligent Transfer
  Service (BITS) via bitsadmin.exe flags (/transfer, /create, /addfile) or
  PowerShell BITS cmdlets (Start-BitsTransfer, Complete-BitsTransfer,
  Add-BitsFile) in a non-system user context. BITS is abused by attackers for
  stealthy file transfer and persistence (T1197), as jobs survive reboots and
  blend into legitimate Windows traffic.
author: Bence Marton
date: 2026-05-01
modified: 2026-05-03
references:
  - https://attack.mitre.org/techniques/T1197/
  - https://lolbas-project.github.io/lolbas/Binaries/Bitsadmin/
tags:
  - attack.execution
  - attack.persistence
  - attack.stealth
  - attack.t1197

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation
detection:
  selection_bitsadmin_image:
    Image|endswith: "\\bitsadmin.exe"

  selection_bitsadmin_flags:
    CommandLine|contains:
      - "/transfer"
      - "/create"
      - "/addfile"

  selection_ps_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_ps_cmdlets:
    CommandLine|contains:
      - "Start-BitsTransfer"
      - "Complete-BitsTransfer"
      - "Add-BitsFile"

  filter_suspicious_path:
    CommandLine|contains:
      - ":\\PerfLogs"
      - ":\\ProgramData\\"
      - ":\\Temp\\"
      - ":\\Users\\Public\\"
      - ":\\Windows\\Temp"
      - "\\$Recycle.Bin\\"
      - "\\AppData\\Local\\"
      - "\\AppData\\Roaming\\"
      - "\\Contacts\\"
      - "\\Desktop\\"
      - "\\Favorites\\"
      - "\\Favourites\\"
      - "\\inetpub\\wwwroot\\"
      - "\\Music\\"
      - "\\Pictures\\"
      - "\\Videos\\"
      - "\\Start Menu\\Programs\\Startup\\"
      - "\\Users\\Default\\"
      - "%ProgramData%"
      - "%public%"
      - "%temp%"
      - "%tmp%"

  filter_suspicious_extension:
    CommandLine|contains:
      - ".bat"
      - ".cmd"
      - ".dll"
      - ".exe"
      - ".hta"
      - ".msi"
      - ".ps1"
      - ".psm1"
      - ".scf"
      - ".sct"
      - ".vbe"
      - ".vbs"
      - ".wsf"
      - ".wsh"
      - ".7z"
      - ".chm"
      - ".rar"
      - ".xll"
      - ".zip"
      - ".asax"
      - ".ashx"
      - ".asmx"
      - ".asp"
      - ".aspx"
      - ".cfm"
      - ".cgi"
      - ".jsp"
      - ".jspx"
      - ".war"
      - ".gif"
      - ".jpeg"
      - ".jpg"
      - ".png"

  filter_legit_user:
    User|contains:
      - "SYSTEM"
      - "NETWORK SERVICE"
      - "LOCAL SERVICE"

  filter_legit_parent:
    ParentImage|endswith:
      - "\\svchost.exe"
      - "\\MsMpEng.exe"

  condition: ( ( selection_bitsadmin_image and selection_bitsadmin_flags ) or (
    selection_ps_image and selection_ps_cmdlets ) ) and not ( filter_legit_user
    or filter_legit_parent )

fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
  - ParentProcessId

falsepositives:
  - SCCM / Configuration Manager package deployments (service account context)
  - Windows Update components (SYSTEM, svchost parent)
  - Legacy Adobe or backup agent installers
  - IT admin scripts using bitsadmin.exe directly
  - Legitimate PowerShell modules using Start-BitsTransfer
level: high
custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: high
  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1197
        test_numbers: [ 1, 2 ]
