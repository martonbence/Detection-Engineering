title: Known Credential Dumping Tool Execution
detect_id: DETECT-2026-0022
status: experimental
description: >
  Detects execution of known credential dumping tools by binary name, original
  file name metadata, or Mimikatz-specific CLI keywords in any process's
  CommandLine. Three complementary detection branches cover distinct evasion
  scenarios across multiple credential-access and Kerberos-abuse techniques
  (T1003.001/002/004/006, T1558.001/002/003).

  Binary name matching catches tools run directly without renaming (common in
  less sophisticated attacks or automated malware drops): mimikatz.exe, wce.exe,
  fgdump.exe, gsecdump.exe, pwdumpx.exe, cachedump.exe, Rubeus.exe, and others.

  OriginalFileName matching catches renamed copies of known tools by inspecting
  PE header metadata written at compile time — a field attackers often overlook.

  CLI keyword matching catches Mimikatz invocations regardless of binary name —
  including renamed copies, reflectively loaded Invoke-Mimikatz, or Cobalt
  Strike's built-in mimikatz command — by looking for Mimikatz module::command
  syntax patterns (sekurlsa::, lsadump::, misc::, privilege::, kerberos::,
  crypto::, token::, vault::, dpapi::). These namespaces are unique to Mimikatz's
  interactive and non-interactive command syntax and do not appear in legitimate
  system operations.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://attack.mitre.org/techniques/T1003/002/
  - https://attack.mitre.org/techniques/T1003/004/
  - https://attack.mitre.org/techniques/T1003/005/
  - https://attack.mitre.org/techniques/T1003/006/
  - https://attack.mitre.org/techniques/T1558/001/
  - https://attack.mitre.org/techniques/T1558/002/
  - https://attack.mitre.org/techniques/T1558/003/
  - https://github.com/gentilkiwi/mimikatz
author: Bence Marton
date: 2026-06-06
modified: 2026-06-21
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.t1003.002
  - attack.t1003.004
  - attack.t1003.005
  - attack.t1003.006
  - attack.t1558.001
  - attack.t1558.002
  - attack.t1558.003

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_known_tools:
    Image|endswith:
      - '\mimikatz.exe'
      - '\wce.exe'
      - '\fgdump.exe'
      - '\gsecdump.exe'
      - '\pwdumpx.exe'
      - '\cachedump.exe'
      - '\pwdump.exe'
      - '\pwdump2.exe'
      - '\pwdump3.exe'
      - '\pwdump4.exe'
      - '\pwdump5.exe'
      - '\pwdump6.exe'
      - '\pwdump7.exe'
      - '\nanodump.x64.exe'
      - '\DumpMinitool.exe'
      - '\xordump.exe'
      - '\createdump.exe'
      - '\Outflank-Dumpert.exe'
      - '\SharpDump.exe'
      - '\SharpDumpx64.exe'
      - '\Rubeus.exe'
      - '\SafetyKatz.exe'
      - '\HandleKatz.exe'
      - '\PPLBlade.exe'
      - '\lsassy.exe'
      - '\lazagne.exe'
      - '\KDU.exe'

  selection_original_name:
    OriginalFileName:
      - "mimikatz.exe"
      - "wce.exe"
      - "fgdump.exe"
      - "gsecdump.exe"
      - "pwdumpx.exe"
      - "cachedump.exe"
      - "Rubeus.exe"
      - "SafetyKatz.exe"
      - "HandleKatz.exe"
      - "PPLBlade.exe"
      - "lsassy.exe"
      - "lazagne.exe"
      - "KDU.exe"
      - "SharpDump.exe"
      - "SharpDumpx64.exe"
      - "Outflank-Dumpert.exe"
      - "xordump.exe"
      - "DumpMinitool.exe"
      - "nanodump.exe"

  selection_keywords_cli:
    CommandLine|contains:
      - "sekurlsa::"
      - "lsadump::"
      - "privilege::"
      - "kerberos::list"
      - "kerberos::golden"
      - "kerberos::silver"
      - "kerberos::ptt"
      - "kerberos::purge"
      - "kerberos::tgt"
      - "kerberos::tgs"
      - "kerberos::ptc"
      - "crypto::"
      - "token::elevate"
      - "token::impersonate"
      - "vault::cred"
      - "vault::list"
      - "dpapi::cred"
      - "dpapi::masterkey"
      - "dpapi::blob"
      - "misc::skeleton"
      - "misc::memssp"
      - "misc::shadowcopies"
      - "misc::printnightmare"
      - "Invoke-Mimikatz"
      - "Invoke-PowerDump"
      - "-DumpCreds"
      - "mimilib.dll"
      - "rpc::"

  filter_createdump_legit:
    Image|startswith:
      - 'C:\Windows\'
      - 'C:\Program Files\dotnet\'
      - 'C:\Program Files (x86)\dotnet\'
    Image|endswith:
      - '\createdump.exe'

  condition: (selection_known_tools and not filter_createdump_legit) or selection_original_name or selection_keywords_cli

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Security research and red team activities under authorized rules of engagement
  - AV/EDR signature testing using deactivated or sandboxed samples
  - CTF competitions and training lab environments

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.001
        test_numbers: [3, 4, 6, 10]
      - technique: T1003.002
        test_numbers: [4]
