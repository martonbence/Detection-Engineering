title: LSASS Credential Dump via comsvcs.dll MiniDump
detect_id: DETECT-2026-0020
status: experimental
description: >
  Detects LSASS memory dump creation using the MiniDump export of the native
  Windows DLL comsvcs.dll, invoked via rundll32.exe. This is a well-known
  living-off-the-land (LOLBAS) technique that avoids dropping third-party
  dumping tools to disk: the attacker passes the LSASS PID, an output file
  path, and the literal string "full" to the MiniDump function, which creates
  a complete minidump of LSASS that can be later parsed offline with Mimikatz
  or pypykatz to extract credentials. Because the target is identified by PID
  rather than process name, "lsass" does not appear in the command line.

  Canonical command form:
    rundll32.exe C:\Windows\System32\comsvcs.dll, MiniDump <lsass_pid> <output> full

  Detection matches on rundll32.exe via Image path or PE OriginalFileName (to
  catch renamed binaries), combined with "comsvcs", "MiniDump", and "full" all
  present in the command line. This combination has a near-zero false-positive
  rate outside of authorized security testing.

  Known gap: ordinal-based invocation (e.g. comsvcs.dll,#24 instead of
  MiniDump by name) bypasses this rule, as the export name does not appear
  in the command line.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://lolbas-project.github.io/lolbas/Libraries/comsvcs/
author: Bence Marton
date: 2026-06-06
modified: 2026-06-06
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.stealth
  - attack.t1218.011

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - '\rundll32.exe'

  selection_original_filename:
    OriginalFileName:
      - "RUNDLL32.EXE"

  selection_cmdlet:
    CommandLine|contains|all:
      - "comsvcs"
      - "MiniDump"
      - "full"

  condition: (selection_image or selection_original_filename) and selection_cmdlet

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - No known legitimate use of comsvcs.dll MiniDump outside of security testing
  - Authorized red team or incident response activities under change control

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.001
        test_numbers: [2]
