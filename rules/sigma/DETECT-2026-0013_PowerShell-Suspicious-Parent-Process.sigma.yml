title: PowerShell Spawned from Suspicious Parent Process
detect_id: DETECT-2026-0013
status: stable
description: Detects PowerShell spawned by processes that rarely have a
  legitimate reason to launch it — including Office applications, browsers,
  script interpreters, COM/WMI hosts, system utilities, and communication
  clients. This pattern is characteristic of phishing macro execution, malicious
  document droppers, exploit chains (e.g. Follina), and living-off-the-land
  lateral movement.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1566/001/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-07
tags:
  - attack.execution
  - attack.t1059.001
  - attack.initial_access
  - attack.t1566.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_parent:
    ParentImage|endswith:
      - "\\winword.exe"
      - "\\excel.exe"
      - "\\outlook.exe"
      - "\\powerpnt.exe"
      - "\\mspub.exe"
      - "\\msaccess.exe"
      - "\\visio.exe"
      - "\\onenote.exe"
      - "\\mshta.exe"
      - "\\wscript.exe"
      - "\\cscript.exe"
      - "\\rundll32.exe"
      - "\\regsvr32.exe"
      - "\\iexplore.exe"
      - "\\firefox.exe"
      - "\\chrome.exe"
      - "\\msedge.exe"
      - "\\acrord32.exe"
      - "\\acrobat.exe"
      - "\\wmiprvse.exe"
      - "\\pcalua.exe"
      - "\\searchprotocolhost.exe"
      - "\\msdt.exe"
      - "\\msiexec.exe"
      - "\\wordpad.exe"
      - "\\teams.exe"
      - "\\msedgewebview2.exe"

  condition: all of selection_*

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - WMI-based management tools invoking PS for legitimate automation (wmiprvse)
  - Browser extension helper processes in enterprise environments
  - SCCM and Intune deployments using msiexec to install software that
    internally invokes PS

level: high

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: high

  testing:
    enabled: true
    runner: windows-victim
    type: emulation
    custom:
      - name: "wscript.exe Spawns PowerShell via VBScript"
        description: >
          Writes a temporary VBScript that launches powershell.exe via
          WScript.Shell.Run, then executes it with wscript.exe — simulating
          a script interpreter parent-child chain where wscript.exe becomes
          the parent of powershell.exe.
        executor: powershell
        command: >-
          $t = Join-Path $env:TEMP 'ep_test.vbs';
          Set-Content -Path $t -Value 'CreateObject("WScript.Shell").Run "powershell.exe -NoProfile -NonInteractive -WindowStyle Hidden -Command exit 0", 0, True';
          Start-Process wscript.exe -ArgumentList $t -Wait
        cleanup: >-
          Remove-Item (Join-Path $env:TEMP 'ep_test.vbs') -Force -ErrorAction SilentlyContinue
        prerequisites:
          - wscript.exe must be present (available by default on Windows)
