title: PowerShell Spawned from Suspicious Parent Process
detect_id: DETECT-2026-0013
status: test
description: Detects PowerShell spawned by processes that have no legitimate
  reason to launch it — including Office applications, browsers, script
  interpreters, and COM/WMI hosts. This pattern is characteristic of phishing
  macro execution, malicious document droppers, and living-off-the-land lateral
  movement chains.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1566/001/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-05
tags:
  - attack.execution
  - attack.t1059.001
  - attack.initial_access
  - attack.t1566.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_parent:
    ParentImage|endswith:
      - "\\winword.exe"
      - "\\excel.exe"
      - "\\outlook.exe"
      - "\\powerpnt.exe"
      - "\\mspub.exe"
      - "\\msaccess.exe"
      - "\\visio.exe"
      - "\\onenote.exe"
      - "\\mshta.exe"
      - "\\wscript.exe"
      - "\\cscript.exe"
      - "\\rundll32.exe"
      - "\\regsvr32.exe"
      - "\\iexplore.exe"
      - "\\firefox.exe"
      - "\\chrome.exe"
      - "\\msedge.exe"
      - "\\acrord32.exe"
      - "\\acrobat.exe"
      - "\\wmiprvse.exe"
      - "\\pcalua.exe"
      - "\\searchprotocolhost.exe"
      - "\\svchost.exe"

  condition: all of selection_*

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - WMI-based management tools invoking PS for legitimate automation (wmiprvse)
  - svchost-hosted scheduled tasks running PS scripts
  - Browser extension helper processes in enterprise environments

level: high

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: high

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1059.001
        test_numbers: [ 1 ]
