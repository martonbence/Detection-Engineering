title: LSASS Memory Dump via Task Manager or Suspicious File Creation
detect_id: DETECT-2026-0025
status: stable
description: >
  Detects the creation of LSASS memory dump files via Sysmon EID 11 (FileCreate),
  covering scenarios that are invisible to process-based LSASS rules.

  The primary technique is Windows Task Manager: right-clicking lsass.exe and
  selecting "Create dump file" writes a complete process memory snapshot to
  %LOCALAPPDATA%\Temp\lsass.DMP. This is entirely GUI-driven and produces no
  process_creation telemetry with LSASS-related arguments, making it invisible
  to DETECT-2026-0019 through DETECT-2026-0021. The FileCreate event captures
  it regardless of the initiating mechanism.

  A second branch detects any process writing a file whose name contains "lsass"
  with a .dmp extension. This covers custom tools, scripts, and automated attack
  frameworks that retain the lsass filename convention — a common oversight in
  attacker tooling — regardless of the parent process.

  Windows Error Reporting (WerFault.exe, WerFaultSecure.exe) can legitimately
  create LSASS crash dumps and is filtered to suppress operational noise while
  preserving detection for all other callers.

references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.001/T1003.001.md
  - https://www.deepinstinct.com/blog/lsass-memory-dumping-techniques
author: Bence Marton
date: 2026-07-08
modified: 2026-07-08
tags:
  - attack.credential_access
  - attack.t1003.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: file_event

detection:
  selection_taskmgr:
    Image|endswith: '\taskmgr.exe'
    TargetFilename|contains: "lsass"
    TargetFilename|endswith: ".dmp"

  selection_lsass_dump:
    TargetFilename|contains: "lsass"
    TargetFilename|endswith: ".dmp"

  filter_wer:
    Image|endswith:
      - '\WerFault.exe'
      - '\WerFaultSecure.exe'

  condition: (selection_taskmgr or selection_lsass_dump) and not filter_wer

fields:
  - _time
  - ComputerName
  - User
  - Image
  - TargetFilename
  - ProcessId
  - ParentImage

falsepositives:
  - Windows Error Reporting creating LSASS crash dumps — filtered via filter_wer
  - Authorized IR/forensic teams creating LSASS captures under documented change control
  - Security products snapshotting LSASS for behavioral analysis — add vendor path to filter_wer

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: emulation
    custom:
      - name: "Create lsass.DMP file to simulate Task Manager LSASS dump"
        description: >
          Creates an empty file named lsass.DMP in the user Temp folder to
          simulate the output artifact of a Task Manager LSASS dump.
          Sysmon EID 11 fires on file creation regardless of file content,
          making this sufficient to validate the FileCreate detection branch
          without requiring elevated privileges or actual memory access.
        executor: powershell
        command: >-
          $p = "$env:LOCALAPPDATA\Temp\lsass.DMP";
          New-Item -ItemType File -Path $p -Force | Out-Null;
          Write-Host "Created: $p"
        cleanup: >-
          Remove-Item -Force "$env:LOCALAPPDATA\Temp\lsass.DMP" -ErrorAction SilentlyContinue
