title: PowerShell Known Malicious Cmdlet Invocation
detect_id: DETECT-2026-0018
status: test
description:
  Detects invocation of known offensive PowerShell cmdlets originating
  from frameworks such as PowerSploit, PowerView, PowerUp, and Nishang. These
  cmdlets cover credential theft, persistence, injection, reconnaissance, and
  lateral movement — their presence in CommandLine is a strong indicator of
  post-exploitation activity.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/PowerShellMafia/PowerSploit
  - https://github.com/samratashok/nishang
author: Bence Marton
date: 2026-05-12
modified: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_cmdlets:
    CommandLine|contains:
      - "Add-Persistence"
      - "Find-AVSignature"
      - "Get-GPPAutologon"
      - "Get-GPPPassword"
      - "Get-HttpStatus"
      - "Get-Keystrokes"
      - "Get-SecurityPackages"
      - "Get-TimedScreenshot"
      - "Get-VaultCredential"
      - "Get-VolumeShadowCopy"
      - "Install-SSP"
      - "Invoke-CredentialInjection"
      - "Invoke-DllInjection"
      - "Invoke-Mimikatz"
      - "Invoke-NinjaCopy"
      - "Invoke-Portscan"
      - "Invoke-ReflectivePEInjection"
      - "Invoke-ReverseDnsLookup"
      - "Invoke-Shellcode"
      - "Invoke-TokenManipulation"
      - "Invoke-WmiCommand"
      - "Mount-VolumeShadowCopy"
      - "New-ElevatedPersistenceOption"
      - "New-UserPersistenceOption"
      - "New-VolumeShadowCopy"
      - "Out-CompressedDll"
      - "Out-EncodedCommand"
      - "Out-EncryptedScript"
      - "Out-Minidump"
      - "PowerUp"
      - "PowerView"
      - "Remove-Comments"
      - "Remove-VolumeShadowCopy"
      - "Set-CriticalProcess"
      - "Set-MasterBootRecord"
      - "Invoke-Kerberoast"
      - "Invoke-ASREPRoast"
      - "Invoke-DCSync"
      - "Invoke-BloodHound"
      - "Invoke-TheHash"
      - "Invoke-WMIExec"
      - "Invoke-SMBExec"
      - "Invoke-DCOM"
      - "Invoke-PowerShellTcp"
      - "Invoke-PowerShellUdp"
      - "Invoke-Inveigh"
      - "Invoke-InveighRelay"
      - "Invoke-EventViewer"
      - "Invoke-SilentCleanup"
      - "Invoke-Tater"
      - "Invoke-Obfuscation"
      - "Get-PassHashes"

  condition: selection_image and selection_cmdlets

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Authorized red team or penetration testing engagements
  - Security researchers running PowerSploit or Nishang in isolated lab environments

level: high

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: high

  testing:
    enabled: true
    runner: windows-victim
    type: emulation
    custom:
      - name: "Invoke-BloodHound Cmdlet Name Explicit in CommandLine"
        description: >
          Spawns a child powershell.exe process with Invoke-BloodHound explicitly
          in the CommandLine. The function is a harmless stub that opens calc.exe —
          the detection triggers on the cmdlet name in the CommandLine, not on the
          function body.
        executor: powershell
        command: >-
          & powershell.exe -NonInteractive -Command 'function Invoke-BloodHound { Start-Process calc.exe }; Invoke-BloodHound -OutputDirectory $env:Temp'
        cleanup: >-
          Stop-Process -Name calculator -Force -ErrorAction SilentlyContinue
        prerequisites:
          - powershell.exe must be available (present by default on Windows)
