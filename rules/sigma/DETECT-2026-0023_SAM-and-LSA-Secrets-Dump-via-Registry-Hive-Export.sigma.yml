title: SAM and LSA Secrets Dump via Registry Hive Export
detect_id: DETECT-2026-0023
status: experimental
description: >
  Detects the use of reg.exe to export credential-sensitive registry hives —
  HKLM\SAM, HKLM\SECURITY, and HKLM\SYSTEM — as the primary step in offline
  credential extraction.

  The SAM hive (T1003.002) contains local account NTLM password hashes. The
  SECURITY hive (T1003.004) contains cached LSA secrets: service account
  credentials, Domain Cached Credentials (DCC2) hashes, auto-logon passwords,
  and VPN or wireless pre-shared keys. When combined with the SYSTEM hive
  (which holds the boot key required for decryption), an attacker can recover
  all of these offline using Impacket secretsdump.py, pypykatz, or Mimikatz
  lsadump::sam / lsadump::secrets — without ever touching LSASS memory.

  This is a classic LOLBAS technique: reg.exe is a legitimate Windows binary
  signed by Microsoft, making it resistant to application allowlisting. Both
  HKLM\SAM and HKLM\SECURITY are readable only by the SYSTEM account, so a
  successful execution indicates the attacker already holds SYSTEM-level
  privileges — placing this event firmly in the late-stage credential
  harvesting phase.

references:
  - https://attack.mitre.org/techniques/T1003/002/
  - https://attack.mitre.org/techniques/T1003/004/
  - https://attack.mitre.org/techniques/T1003/005/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.002/T1003.002.md
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.004/T1003.004.md
author: Bence Marton
date: 2026-06-21
modified: 2026-06-25
tags:
  - attack.credential_access
  - attack.t1003.002
  - attack.t1003.004
  - attack.t1003.005

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - '\reg.exe'

  selection_original_filename:
    OriginalFileName: "reg.exe"

  selection_save:
    CommandLine|contains:
      - " save "
      - " export "

  selection_target_hives:
    CommandLine|contains:
      - 'HKLM\SAM'
      - 'HKLM\SECURITY'
      - 'HKLM\SYSTEM'

  condition: (selection_image or selection_original_filename) and selection_save and selection_target_hives

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - No known legitimate use case for exporting HKLM\SAM or HKLM\SECURITY
    outside of incident response or forensic investigation under documented
    change control
  - HKLM\SYSTEM export by legitimate backup software using reg.exe directly
    (rare — most backup tools use their own API, not reg.exe)

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.002
        test_numbers: [1, 8]
      - technique: T1003.004
        test_numbers: [1]
