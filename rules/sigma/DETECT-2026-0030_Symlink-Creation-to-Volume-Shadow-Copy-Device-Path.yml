title: Symlink Creation to Volume Shadow Copy Device Path
detect_id: DETECT-2026-0030
status: stable
description: >
  Detects creation of a directory symbolic link or junction whose target is
  a raw Volume Shadow Copy device path
  (\\?\GLOBALROOT\Device\HarddiskVolumeShadowCopyN), via either the mklink
  built-in command or PowerShell's New-Item -ItemType SymbolicLink/Junction
  equivalent.

  This is a documented evasion technique against VSS-path-based credential
  hive detection: DETECT-2026-0024 (NTDS.dit) and DETECT-2026-0027
  (SAM/SECURITY/SYSTEM hives) both key on the literal string
  "HarddiskVolumeShadowCopy" appearing in the CommandLine of the process
  that reads the credential file. Once a symlink is created pointing at the
  shadow copy device, every subsequent file operation references the
  symlink path instead — the raw VSS device path never appears again,
  silently evading both of those rules.

  Legitimate administrative or backup use of this pattern is effectively
  nonexistent: VSS-aware backup software accesses shadow copies through the
  VSS writer/requestor API, not by manually creating a persistent symlink
  to the underlying device path. A symlink pointing at a VSS device is a
  strong, largely unambiguous indicator of intentional evasion.

references:
  - https://attack.mitre.org/techniques/T1003/003/
  - https://attack.mitre.org/techniques/T1003/002/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.003/T1003.003.md
author: Bence Marton
date: 2026-07-11
modified: 2026-07-11
tags:
  - attack.credential_access
  - attack.t1003.003

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_mklink:
    CommandLine|contains: "mklink"

  selection_powershell_symlink:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - "SymbolicLink"
      - "Junction"

  selection_vss_target:
    CommandLine|contains: "HarddiskVolumeShadowCopy"

  condition: (selection_mklink or selection_powershell_symlink) and selection_vss_target

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - No known legitimate use case for symlinking to a raw Volume Shadow Copy
    device path outside of forensic/incident response tooling under
    documented change control

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-dc
    type: atomic
    atomics:
      - technique: T1003.003
        test_numbers: [8]
