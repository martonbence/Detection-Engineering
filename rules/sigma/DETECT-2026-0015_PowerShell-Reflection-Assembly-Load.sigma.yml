title: PowerShell Reflection-Based Assembly Load
detect_id: DETECT-2026-0015
status: stable
description: Detects PowerShell commands that load a .NET assembly directly into
  memory via reflection, bypassing filesystem-based execution. Also covers
  native memory operations via InteropServices.Marshal that indicate shellcode
  staging. This technique is used by offensive frameworks (Cobalt Strike,
  Metasploit, PowerSploit) to execute credential stealers and
  post-exploitation modules without writing an executable to disk.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1620/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-12
tags:
  - attack.execution
  - attack.t1059.001
  - attack.stealth
  - attack.t1620

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_reflect:
    CommandLine|contains:
      - "Reflection.Assembly]::Load("
      - "Reflection.Assembly]::LoadFile("
      - "Reflection.Assembly]::LoadFrom("
      - "Reflection.Assembly]::LoadWithPartialName("
      - "Reflection.Assembly]::UnsafeLoadFrom("
      - "[Runtime.InteropServices.Marshal]::Copy("
      - "[Runtime.InteropServices.Marshal]::AllocHGlobal("
      - "[AppDomain]::CurrentDomain.Load("
      - "::Load([Convert]::FromBase64String("

  filter_legitimate:
    ParentImage|endswith:
      - "\\devenv.exe"
      - "\\msbuild.exe"

  condition: selection_image and selection_reflect and not filter_legitimate

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Advanced legitimate PS modules using reflection for compatibility shims
  - Security tooling and EDR agents that inspect PS reflection activity
  - Custom automation frameworks loading helper assemblies at runtime

level: high

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: high

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1620
        test_numbers: [1]
