title: DCSync via DSInternals Get-ADReplAccount
detect_id: DETECT-2026-0029
status: experimental
description: >
  Detects use of the DSInternals PowerShell module's Get-ADReplAccount cmdlet
  to pull account secrets — including NTLM hashes, Kerberos keys, and
  password history — from a Domain Controller over the MS-DRSR directory
  replication protocol.

  This achieves the same outcome as the classic Mimikatz lsadump::dcsync
  attack (T1003.006) but without ever touching Mimikatz: DSInternals is a
  signed, legitimate PowerShell module, and Get-ADReplAccount is a real
  administrative cmdlet used for AD backup and password-audit tooling. As
  with any DCSync-style attack, successfully retrieving output requires the
  calling account to hold Replicating Directory Changes / Replicating
  Directory Changes All rights on the domain — so a non-privileged or
  unexpected account invoking this cmdlet indicates either a compromised
  privileged account or a prior AD ACL abuse step (e.g. granting these
  rights to a controlled principal).

references:
  - https://attack.mitre.org/techniques/T1003/006/
  - https://www.dsinternals.com/en/retrieving-active-directory-passwords-remotely/
  - https://github.com/MichaelGrafnetter/DSInternals
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.006/T1003.006.md
author: Bence Marton
date: 2026-07-11
modified: 2026-07-11
tags:
  - attack.credential_access
  - attack.t1003.006

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'

  selection_cmdlet:
    CommandLine|contains:
      - "Get-ADReplAccount"

  condition: selection_image and selection_cmdlet

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Authorized AD password-audit or credential-hygiene tooling built on
    DSInternals (e.g. weak/leaked password checks against NTLM hashes)
  - AD disaster-recovery or backup processes that use DSInternals to export
    account secrets under documented change control
  - Security assessment tools (e.g. PingCastle, Purple Knight) invoking
    DSInternals cmdlets during an authorized engagement

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.006
        test_numbers: [2]
