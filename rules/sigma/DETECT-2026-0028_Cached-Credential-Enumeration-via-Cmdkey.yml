title: Cached Credential Enumeration via Cmdkey
detect_id: DETECT-2026-0028
status: stable
description: >
  Detects the use of cmdkey.exe with the /list switch to enumerate credentials
  stored in Windows Credential Manager, including cached domain credential
  targets for RDP sessions, mapped network shares, and other saved logons.

  cmdkey /list only returns credential target names and associated
  usernames — it does not disclose passwords, which Windows never exposes
  through cmdkey. As such this is a reconnaissance / discovery step rather
  than a direct secrets dump: attackers use it to identify which remote
  hosts or shares a compromised account has saved credentials for, informing
  follow-on lateral movement (T1021) or targeted credential theft.

  Because cmdkey /list is also a common, legitimate troubleshooting command
  (help desk verifying saved RDP credentials, scripts auditing stored network
  credentials), this rule is intentionally scored low and is best used as a
  discovery/context signal that gains significance when correlated with
  subsequent authentication to the enumerated targets or other credential
  access activity.

references:
  - https://attack.mitre.org/techniques/T1003/005/
  - https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/cmdkey
  - https://www.peew.pw/blog/2017/11/26/exploring-cmdkey-an-edge-case-for-privilege-escalation
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.005/T1003.005.md
author: Bence Marton
date: 2026-07-11
modified: 2026-07-11
tags:
  - attack.credential_access
  - attack.t1003.005

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - '\cmdkey.exe'

  selection_original_filename:
    OriginalFileName: "cmdkey.exe"

  selection_list:
    CommandLine|contains: "/list"

  condition: (selection_image or selection_original_filename) and selection_list

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Help desk or IT support checking a user's stored RDP or network share
    credentials during troubleshooting
  - Logon scripts or credential hygiene audits that enumerate Credential
    Manager entries
  - Automated deployment or Group Policy scripts validating stored
    credentials before mapping drives

level: low

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: low

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.005
        test_numbers: [1]
