title: PowerShell Script Block or Module Logging Disable
detect_id: DETECT-2026-0016
status: test
description: Detects PowerShell commands that disable or tamper with ScriptBlock
  or Module logging — either via registry manipulation (Set-ItemProperty on the
  PowerShell policy path) or via in-memory reflection patching of the
  cachedGroupPolicySettings field. Disabling these logs is a common
  anti-forensics step before executing malicious payloads.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1562/002/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-05
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1562.002

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_logging:
    CommandLine|contains:
      - "ScriptBlockLogging"
      - "EnableScriptBlockLogging"
      - "ModuleLogging"
      - "EnableModuleLogging"
      - "cachedGroupPolicySettings"
      - "SOFTWARE\\Policies\\Microsoft\\Windows\\PowerShell"

  condition: selection_image and selection_logging

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Group Policy management scripts auditing or enforcing PowerShell logging
    settings
  - Security hardening scripts enabling logging (same strings, opposite intent)
  - SIEM/EDR deployment scripts configuring PS logging policy

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1562.002
        test_numbers: [ 1 ]
