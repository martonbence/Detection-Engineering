title: PowerShell AMSI Bypass
detect_id: DETECT-2026-0012
status: stable
description: Detects PowerShell commands that attempt to bypass the Antimalware
  Scan Interface (AMSI) by manipulating the AmsiUtils type, patching
  AmsiScanBuffer in memory, or disabling AMSI initialization. Successful AMSI
  bypass allows subsequent malicious scripts to execute without AV/EDR
  inspection — making this a critical precursor to many PS-based attacks.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1562/001/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-11
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1562.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_amsi:
    CommandLine|contains:
      - "AmsiUtils"
      - "amsiInitFailed"
      - "AmsiScanBuffer"
      - "amsi.dll"
      - "AmsiOpenSession"
      - "AmsiScanString"
      - "amsiContext"
      - "amsiSession"
      - "AmsiInitialize"
      - "AmsiCloseSession"

  condition: selection_image and selection_amsi

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Security testing tools and red team frameworks referencing AMSI internals
  - AV/EDR vendor scripts performing AMSI integration testing
  - Security research and educational scripts

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: emulation
    custom:
      - name: "AmsiUtils Multi-Field Reflection Read via Child PowerShell"
        description: >
          Spawns a child powershell.exe whose CommandLine enumerates four AMSI
          internal fields (amsiInitFailed, amsiContext, amsiSession) via
          reflection on System.Management.Automation.AmsiUtils — matching four
          detection keywords simultaneously. All calls are read-only (GetValue,
          no SetValue), so AMSI is never actually disabled.
        executor: powershell
        command: >-
          $innerCmd = 'try{$t=[Ref].Assembly.GetType(''System.Management.Automation.AmsiUtils'');$t.GetField(''amsiInitFailed'',''NonPublic,Static'').GetValue($null);$t.GetField(''amsiContext'',''NonPublic,Static'').GetValue($null);$t.GetField(''amsiSession'',''NonPublic,Static'').GetValue($null)}catch{};Write-Host DETECT-2026-0012-OK';
          Start-Process powershell.exe -ArgumentList '-NoProfile','-NonInteractive','-WindowStyle','Hidden','-Command',$innerCmd -Wait
        prerequisites:
          - PowerShell must be available (present by default on Windows)
