title: PowerShell AMSI Bypass
detect_id: DETECT-2026-0012
status: stable
description: Detects PowerShell commands that attempt to bypass the Antimalware
  Scan Interface (AMSI) by manipulating the AmsiUtils type, patching
  AmsiScanBuffer in memory, or disabling AMSI initialization. Successful AMSI
  bypass allows subsequent malicious scripts to execute without AV/EDR
  inspection — making this a critical precursor to many PS-based attacks.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1562/001/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-11
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1562.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_amsi:
    CommandLine|contains:
      - "AmsiUtils"
      - "amsiInitFailed"
      - "AmsiScanBuffer"
      - "amsi.dll"
      - "AmsiOpenSession"
      - "AmsiScanString"
      - "amsiContext"
      - "amsiSession"
      - "AmsiInitialize"
      - "AmsiCloseSession"

  condition: selection_image and selection_amsi

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Security testing tools and red team frameworks referencing AMSI internals
  - AV/EDR vendor scripts performing AMSI integration testing
  - Security research and educational scripts

level: high

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: high

  testing:
    enabled: true
    runner: windows-victim
    type: emulation
    custom:
      - name: "AMSI Keyword Presence in Child PowerShell CommandLine"
        description: >
          Spawns a child powershell.exe whose CommandLine contains four AMSI
          internal identifiers (AmsiUtils, amsiInitFailed, amsiContext,
          amsiSession) as Write-Host arguments — matching four detection
          keywords simultaneously without executing any bypass logic, so AV
          and AMSI do not block process creation.
        executor: powershell
        command: >-
          $a = 'AmsiUtils'; $b = 'amsiInitFailed'; $c = 'amsiContext'; $d = 'amsiSession';
          $innerCmd = "Write-Host $a; Write-Host $b; Write-Host $c; Write-Host $d; Write-Host DETECT-2026-0012-OK";
          Start-Process powershell.exe -ArgumentList '-NoProfile','-NonInteractive','-WindowStyle','Hidden','-Command',$innerCmd -Wait
        prerequisites:
          - PowerShell must be available (present by default on Windows)
