title: PowerShell AMSI Bypass
detect_id: DETECT-2026-0012
status: stable
description: Detects PowerShell commands that attempt to bypass the Antimalware
  Scan Interface (AMSI) by manipulating the AmsiUtils type, patching
  AmsiScanBuffer in memory, or disabling AMSI initialization. Successful AMSI
  bypass allows subsequent malicious scripts to execute without AV/EDR
  inspection — making this a critical precursor to many PS-based attacks.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1562/001/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-11
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1562.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_amsi:
    CommandLine|contains:
      - "AmsiUtils"
      - "amsiInitFailed"
      - "AmsiScanBuffer"
      - "amsi.dll"
      - "AmsiOpenSession"
      - "AmsiScanString"
      - "amsiContext"
      - "amsiSession"
      - "AmsiInitialize"
      - "AmsiCloseSession"

  condition: selection_image and selection_amsi

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Security testing tools and red team frameworks referencing AMSI internals
  - AV/EDR vendor scripts performing AMSI integration testing
  - Security research and educational scripts

level: high

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: high

  testing:
    enabled: true
    runner: windows-victim
    type: emulation
    custom:
      - name: "AMSI Keyword Presence via wscript.exe-Spawned PowerShell"
        description: >
          Writes a temporary VBScript that launches powershell.exe via
          WScript.Shell.Run. The spawned process CommandLine contains four AMSI
          internal identifiers (AmsiUtils, amsiInitFailed, amsiContext,
          amsiSession) as a PowerShell comment after exit 0 — Sysmon records
          the full CommandLine for detection, but the keywords are never
          evaluated so AV does not block process creation.
        executor: powershell
        command: >-
          $t = Join-Path $env:TEMP 'amsi_test.vbs';
          Set-Content -Path $t -Value 'CreateObject("WScript.Shell").Run "powershell.exe -Command exit 0 #AmsiUtils amsiInitFailed amsiContext amsiSession", 0, True';
          Start-Process wscript.exe -ArgumentList $t -Wait
        cleanup: >-
          Remove-Item (Join-Path $env:TEMP 'amsi_test.vbs') -Force -ErrorAction SilentlyContinue
        prerequisites:
          - wscript.exe must be present (available by default on Windows)
