title: BITS Persistence via SetNotifyCmdLine
detect_id: DETECT-2026-0006
status: stable
description: Detects use of bitsadmin.exe /setnotifycmdline, which registers an
  arbitrary command to execute automatically when a BITS job completes.
  Attackers abuse this to chain payload delivery with execution — the BITS job
  downloads the file, and /setnotifycmdline triggers it without further user
  interaction. This flag has no known legitimate production use case and is a
  strong indicator of persistence establishment (T1197).
author: Bence Marton
date: 2026-05-01
modified: 2026-05-03
references:
  - https://attack.mitre.org/techniques/T1197/
  - https://lolbas-project.github.io/lolbas/Binaries/Bitsadmin/
  - https://pentestlab.blog/2019/10/30/persistence-bits-jobs/
tags:
  - attack.execution
  - attack.persistence
  - attack.stealth
  - attack.t1197

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image_commandline:
    Image|endswith: "\\bitsadmin.exe"
    CommandLine|contains: "/setnotifycmdline"

  filter_legit_user:
    User|contains:
      - "SYSTEM"
      - "NETWORK SERVICE"

  filter_legit_parent:
    ParentImage|endswith:
      - "\\svchost.exe"

  condition: selection_image_commandline and not (filter_legit_user and
    filter_legit_parent)

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - None known; /setnotifycmdline has no legitimate production use case

level: critical
custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical
  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1197
        test_numbers: [ 3 ]
