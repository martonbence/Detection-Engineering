title: Credential Hive Access via Low-Level NTFS Acquisition
detect_id: DETECT-2026-0031
status: stable
description: >
  Detects invocation of the UnderlayCopy PowerShell tool's Underlay-Copy
  cmdlet against NTDS.dit or a SAM/SECURITY/SYSTEM registry hive file.

  UnderlayCopy performs low-level NTFS acquisition — either by parsing the
  Master File Table (MFT mode) or by reading raw file metadata via fsutil
  (Metadata mode) — to copy files that are exclusively locked by the OS at
  runtime, including NTDS.dit on a Domain Controller and the SAM/SECURITY/
  SYSTEM hives on any Windows Host.

  This bypasses both detection surfaces the rest of this rule family relies
  on: it never creates a Volume Shadow Copy (so the "HarddiskVolumeShadowCopy"
  string used by DETECT-2026-0024 and DETECT-2026-0027 never appears), and it
  never shells out to cmd.exe's copy command (so the "/c copy " pattern used
  by DETECT-2026-0024's direct-copy branch never appears either). The
  Underlay-Copy cmdlet name itself is the most reliable fingerprint —
  it is a distinctive, single-purpose community tool with no legitimate
  presence in standard administrative scripting.

references:
  - https://attack.mitre.org/techniques/T1003/003/
  - https://attack.mitre.org/techniques/T1003/002/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.003/T1003.003.md
  - https://github.com/kfallahi/UnderlayCopy
author: Bence Marton
date: 2026-07-11
modified: 2026-07-11
tags:
  - attack.credential_access
  - attack.t1003.003

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'

  selection_cmdlet:
    CommandLine|contains: "Underlay-Copy"

  selection_target:
    CommandLine|contains:
      - '\ntds\ntds.dit'
      - '\config\SAM'
      - '\config\SECURITY'
      - '\config\SYSTEM'

  condition: selection_image and selection_cmdlet and selection_target

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - No known legitimate use case — UnderlayCopy is a single-purpose
    offensive/red-team acquisition tool with no administrative function

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-dc
    type: atomic
    atomics:
      - technique: T1003.003
        test_numbers: [10, 11]
