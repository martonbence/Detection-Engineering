title: Credential Hive Access via Volume Shadow Copy
detect_id: DETECT-2026-0027
status: stable
description: >
  Detects any process accessing credential-sensitive registry hive files
  (SAM, SECURITY, SYSTEM) through a Volume Shadow Copy path in its CommandLine.

  Volume Shadow Copy paths (\\?\GLOBALROOT\Device\HarddiskVolumeShadowCopy*)
  bypass the exclusive OS locks placed on live registry hives, allowing an
  attacker to read or copy SAM, SECURITY, and SYSTEM without stopping the
  relevant Windows services. The resulting files can be decrypted offline with
  Impacket secretsdump.py, pypykatz, or Mimikatz lsadump::sam / lsadump::secrets.

  This rule is tool-agnostic: the VSS path combined with a credential hive name
  appears in the CommandLine regardless of which LOLBAS or custom binary performs
  the access. Known exploiting tools include certutil.exe (-encodehex),
  PowerShell ([System.IO.File]::Copy), xcopy.exe, robocopy.exe, and cmd.exe
  (copy command).

  CVE-2021-36934 (HiveNightmare / SeriousSAM) made this technique exploitable
  by non-admin users on unpatched Windows 10/11 systems: a misconfigured ACL on
  the VSS copies of credential hives allowed standard users to read SAM and
  SECURITY directly. The detection fires on both privileged and unprivileged
  access attempts since the CommandLine pattern is identical in both cases.

  Note: VSS access targeting NTDS.dit on Domain Controllers is a separate
  technique (T1003.003) covered by DETECT-2026-0024.

references:
  - https://attack.mitre.org/techniques/T1003/002/
  - https://attack.mitre.org/techniques/T1003/004/
  - https://attack.mitre.org/techniques/T1003/005/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.002/T1003.002.md
  - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2021-36934
  - https://www.kb.cert.org/vuls/id/506989
author: Bence Marton
date: 2026-07-08
modified: 2026-07-08
tags:
  - attack.credential_access
  - attack.t1003.002
  - attack.t1003.004
  - attack.t1003.005

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_vss_path:
    CommandLine|contains: "HarddiskVolumeShadowCopy"

  selection_hives:
    CommandLine|contains:
      - '\config\SAM'
      - '\config\SECURITY'

  condition: selection_vss_path and selection_hives

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Backup software that exposes VSS shadow copy paths in process CommandLine
    when backing up system state — filter by trusted ParentImage or Image path
  - Authorized forensic or incident response tools accessing VSS copies of
    credential hives under documented change control

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.002
        test_numbers: [5]
