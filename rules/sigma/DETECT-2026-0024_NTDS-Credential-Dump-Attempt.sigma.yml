title: NTDS.dit Credential Dump Attempt
detect_id: DETECT-2026-0024
status: experimental
description: >
  Detects attempts to extract credential data from the Active Directory database
  (NTDS.dit) stored on Domain Controllers via seven complementary detection branches.

  ntdsutil.exe IFM (Install From Media) is the most common native method: the
  attacker activates the NTDS instance and calls "ifm create full" to produce a
  self-contained copy of NTDS.dit and the SYSTEM hive that can be taken offline for
  credential extraction with Impacket secretsdump, DSInternals, or Mimikatz
  lsadump::lsa. The "ac i ntds" and "activate instance ntds" variants are
  abbreviated and long-form equivalents of the same sub-command sequence.

  esentutl.exe can copy the locked NTDS.dit by leveraging the Volume Shadow Copy
  Service (/vss flag) or the generic file-copy operation (/y), bypassing the
  Extensible Storage Engine (ESE) lock that prevents direct file access while AD
  DS is running.

  Volume Shadow Copy paths in any process's CommandLine indicate direct extraction
  of NTDS.dit from a VSS snapshot — the manual copy step that follows snapshot
  creation via vssadmin, wmic, or PowerShell WMI. The process is typically
  xcopy.exe, robocopy.exe, or cmd.exe piping a copy command.

  diskshadow.exe invoked in script mode (/s) is a LOLBin technique used to
  automate the full snapshot-and-extract workflow in a single binary call.
  Legitimate interactive diskshadow sessions do not require a script file argument.

  wbadmin.exe (Windows Server Backup) can be abused to back up or recover the
  NTDS.dit file or the entire NTDS directory, producing an offline-accessible copy
  without touching VSS shadow paths directly. Unlike vssadmin or WMI-based snapshot
  creation — where the target file is implicit — wbadmin embeds the source path in
  its CommandLine (-include: or -items:), making the NTDS reference directly
  observable in process telemetry.

  Direct live-path copy detects any process that runs a copy command against the
  NTDS.dit at its original location (C:\Windows\NTDS\ntds.dit) rather than through
  a shadow copy or backup utility. This succeeds only when AD DS is stopped; the
  pattern still fires if an attacker attempts it while the service is running,
  revealing the intent regardless of whether the copy actually completes.

  Known NTDS dump tools are matched by binary name, OriginalFileName PE metadata,
  and characteristic CLI patterns. NTDSDump.exe and NTDSDumpEx.exe are purpose-built
  NTDS extraction utilities. The ntds.dit + system.hiv CLI combination is a
  fingerprint of offline extraction workflows that require both the ESE database and
  the SYSTEM hive boot key for decryption. NTDSgrab.ps1 is a PowerShell wrapper
  that automates the same extraction flow.

references:
  - https://attack.mitre.org/techniques/T1003/003/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.003/T1003.003.md
  - https://www.ired.team/offensive-security/credential-access-and-credential-dumping/ntds.dit-enumeration
  - https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-r2-and-2012/cc732530(v=ws.11)
author: Bence Marton
date: 2026-06-27
modified: 2026-06-27
tags:
  - attack.credential_access
  - attack.t1003.003

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  # Branch 1 — ntdsutil IFM: most specific indicator of T1003.003 ##3
  selection_ntdsutil_image:
    - Image|endswith: '\ntdsutil.exe'
    - OriginalFileName: "ntdsutil.exe"

  selection_cli_1:
    CommandLine|contains|all:
      - "ac i ntds"
      - "create full"

  selection_cli_2:
    CommandLine|contains|all:
      - "activate instance ntds"
      - "create full"

  selection_direct_ntds_copy:
    CommandLine|contains|all:
      - "/c copy "
      - '\windows\ntds\ntds.dit'

  # Branch 2 — esentutl direct NTDS.dit copy
  selection_esentutl_image:
    - Image|endswith: '\esentutl.exe'
    - OriginalFileName: "esentutl.exe"

  selection_esentutl_ntds:
    CommandLine|contains: '\windows\ntds\ntds.dit'

  # Branch 3 — any process extracting NTDS.dit from a VSS snapshot path
  selection_vss_shadow:
    CommandLine|contains: "HarddiskVolumeShadowCopy"

  selection_vss_ntds:
    CommandLine|contains: '\windows\ntds\ntds.dit'

  # Branch 4 — diskshadow.exe script-mode execution
  selection_diskshadow_image:
    - Image|endswith: '\diskshadow.exe'
    - OriginalFileName: "diskshadow.exe"

  selection_diskshadow_script:
    CommandLine|contains: "/s "

  # Branch 5 — wbadmin backup/recovery targeting NTDS.dit
  selection_wbadmin_image:
    - Image|endswith: '\wbadmin.exe'
    - OriginalFileName: "WBADMIN.EXE"

  selection_wbadmin_ntds:
    CommandLine|contains: '\windows\ntds'

  # Branch 6 — NTDS dump tool
  selection_tool:
    - Image|endswith:
        - '\NTDSDump.exe'
        - '\NTDSDumpEx.exe'
    - OriginalFileName:
        - "NTDSDump.exe"
        - "NTDSDumpEx.exe"
    - CommandLine|contains|all:
        - "ntds.dit"
        - "system.hiv"
    - CommandLine|contains: "NTDSgrab.ps1"

  condition: >-
    (selection_ntdsutil_image and 1 of selection_cli*)
    or selection_direct_ntds_copy
    or (selection_esentutl_image and selection_esentutl_ntds)
    or (selection_vss_shadow and selection_vss_ntds)
    or (selection_diskshadow_image and selection_diskshadow_script)
    or (selection_wbadmin_image and selection_wbadmin_ntds)
    or selection_tool

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - ntdsutil.exe IFM — legitimate DC provisioning and IFM media creation; expected
    only from known admin accounts during planned Domain Controller deployments
  - esentutl.exe — offline AD database defragmentation or integrity checks; rare,
    always requires AD DS to be stopped and documented in change management
  - VSS + ntds.dit path — backup software exposing shadow copy paths in CommandLine
    (e.g., Veeam, Windows Server Backup); filter by trusted ParentImage if needed
  - diskshadow.exe /s — backup and storage automation scripts using diskshadow
    for disk management tasks unrelated to NTDS
  - wbadmin.exe — legitimate offline AD DS backup or recovery by authorized
    administrators; requires AD DS to be stopped and documented in change management
  - direct live-path copy — no known legitimate use; any process copying ntds.dit
    from its original path warrants immediate investigation
  - NTDSDump/NTDSDumpEx/NTDSgrab.ps1 — no known legitimate use outside authorized
    red team or penetration testing engagements

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.003
        test_numbers: [3, 6, 9]
