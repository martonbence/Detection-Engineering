title: PowerShell Inline Base64 Decode and Execute
detect_id: DETECT-2026-0009
status: stable
description: Detects PowerShell payloads that decode a Base64 string at runtime
  and immediately execute the result via IEX or equivalent. Unlike encoded
  command flags (-EncodedCommand, covered by DETECT-2026-0007), this technique
  embeds the Base64 payload inline in the script body using
  [System.Convert]::FromBase64String or FromBase64CharArray, making it resistant
  to simple flag-based detection while still leaving a characteristic
  decode-then-execute signature in the CommandLine.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/010/
author: Bence Marton
date: 2026-05-04
modified: 2026-05-05
tags:
  - attack.execution
  - attack.t1059.001
  - attack.stealth
  - attack.t1027.010

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_decode:
    CommandLine|contains:
      - "FromBase64String"
      - "FromBase64CharArray("

  selection_iex:
    CommandLine|contains:
      - "| IEX"
      - "|IEX "
      - "I`E`X"
      - "I`EX"
      - "IE`X"
      - "iex "
      - "IEX ("
      - "IEX("
      - "iex("
      - "Invoke-Expression"
      - "[scriptblock]::create("
      - "|iex;"
      - "| iex}"
      - "$ExecutionContext.InvokeCommand"
      - "&([scriptblock]"

  condition: all of selection_*

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Legitimate scripts that decode Base64-encoded configuration or binary data
    and process it without execution
  - PowerShell DSC resources that decode and apply configuration payloads
  - Custom module loaders using Base64 for binary serialization

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1027
        test_numbers: [ 3 ]
      - technique: T1059.001
        test_numbers: [ 10 ]
