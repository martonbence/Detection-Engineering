title: PowerShell Execution Policy Bypass
detect_id: DETECT-2026-0010
status: test
description: Detects PowerShell invocations that bypass or disable the execution
  policy — a common first step used by attackers to run unsigned or restricted
  scripts. Covers command-line flag forms (-ExecutionPolicy/-ep with Bypass or
  Unrestricted) and runtime Set-ExecutionPolicy calls.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-05
tags:
  - attack.execution
  - attack.t1059.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_bypass:
    CommandLine|contains:
      - "-ExecutionPolicy Bypass"
      - "-ExecutionPolicy bypass"
      - "-ExecutionPolicy Unrestricted"
      - "-ExecutionPolicy unrestricted"
      - "-ep bypass"
      - "-ep Bypass"
      - "-ep Unrestricted"
      - "-ep unrestricted"
      - "Set-ExecutionPolicy Bypass"
      - "Set-ExecutionPolicy Unrestricted"

  condition: selection_image and selection_bypass

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Software installers and package managers (Chocolatey, NuGet, Scoop)
  - CI/CD pipelines and build agents requiring unsigned script execution
  - IT admin bootstrap and provisioning scripts
  - Remote management tools (SCCM, Ansible, DSC)

level: medium

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: medium

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1059.001
        test_numbers: [ 1 ]
