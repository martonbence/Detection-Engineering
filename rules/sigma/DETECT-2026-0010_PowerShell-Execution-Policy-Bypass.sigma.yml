title: PowerShell Execution Policy Bypass
detect_id: DETECT-2026-0010
status: stable
description: Detects PowerShell invocations that bypass the execution policy — a
  common initial step for running unsigned or untrusted scripts. Covers
  parameter-based bypasses (-ExecutionPolicy/-ep/-exec/-ex Bypass|Unrestricted),
  scope-targeted Set-ExecutionPolicy calls, and direct policy changes via the
  Set-ExecutionPolicy cmdlet.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Bence Marton
date: 2026-05-05
modified: 2026-05-07
tags:
  - attack.execution
  - attack.t1059.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"

  selection_option:
    CommandLine|contains:
      - "-executionpolicy "
      - " -ep "
      - " -exec "
      - " -ex "

  selection_level:
    CommandLine|contains:
      - "Bypass"
      - "Unrestricted"
      - "-Scope"

  condition: selection_image and selection_option and selection_level

fields:
  - _time
  - ComputerName
  - User
  - Image
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Software installers and package managers (Chocolatey, NuGet, Scoop)
  - CI/CD pipelines and build agents requiring unsigned script execution
  - IT admin bootstrap and provisioning scripts
  - Remote management tools (SCCM, Ansible, DSC)

level: medium

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: medium

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1059.001
        test_numbers: [ 6, 7 ]
