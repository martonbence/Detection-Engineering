title: LSASS Dump via ProcDump
detect_id: DETECT-2026-0021
status: experimental
description: >
  Detects the use of Sysinternals ProcDump (procdump.exe / procdump64.exe) to
  create a memory dump of the LSASS process. ProcDump is a legitimate diagnostic
  tool, but targeting lsass.exe specifically is a classic credential harvesting
  step: the resulting .dmp file can be copied off-system and parsed with Mimikatz
  (sekurlsa::minidump) or pypykatz to recover plaintext credentials, NTLM hashes,
  and Kerberos tickets without ever running an offensive tool on the victim host.

  Detection matches on "procdump" in either the Image path or the PE
  OriginalFileName (to catch renamed binaries), combined with "lsass" in the
  command line and at least one dump-mode flag (-ma/-mm/-mp) or related switch.
  PID-based targeting (e.g. procdump -ma 624) is a known gap: the LSASS process
  name does not appear in the command line in that case.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://learn.microsoft.com/en-us/sysinternals/downloads/procdump
author: Bence Marton
date: 2026-06-06
modified: 2026-06-06
tags:
  - attack.credential_access
  - attack.t1003.001

logsource:
  product_category: os
  product: windows
  service: sysmon
  event_type: process_creation

detection:
  selection_image:
    Image|contains:
      - '\procdump'

  selection_original_filename:
    OriginalFileName|contains:
      - "procdump"

  selection_lsass:
    CommandLine|contains:
      - "lsass"

  selection_dump_flag:
    CommandLine|contains:
      - ".dmp"
      - "-ma"
      - "-mm"
      - "-mp"
      - "-accepteula"
      - "-r"

  condition: (1 of selection_image or 1 of selection_original_filename) and selection_lsass and 1 of selection_dump_flag

fields:
  - _time
  - ComputerName
  - User
  - Image
  - OriginalFileName
  - CommandLine
  - CurrentDirectory
  - IntegrityLevel
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Authorized IT/security staff using ProcDump on LSASS for legitimate crash
    analysis under documented change control
  - Incident response workflows creating LSASS captures for forensic investigation

level: critical

custom:
  splunk:
    index: sysmon
    mode: alert
    cron: "*/5 * * * *"
    earliest: "-5m"
    latest: "now"
    severity: critical

  testing:
    enabled: true
    runner: windows-victim
    type: atomic
    atomics:
      - technique: T1003.001
        test_numbers: [1, 9]
