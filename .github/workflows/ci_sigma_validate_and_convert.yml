name: CI - Sigma to Splunk Pipeline

on:
  push:
    branches: [ "**" ]
    paths:
      - "rules/sigma/**/*.yml"
      - "rules/sigma/**/*.yaml"
      - "docs/schemas/sigma_schema.json"
      - "scripts/validate/**"
      - "scripts/convert/sigma_to_spl.py"
      - "scripts/deploy/deploy_spl_to_splunk.py"
      - "scripts/atomic/run_atomic.ps1"
      - "scripts/verify/**"
      - ".github/workflows/ci_sigma_validate_and_convert.yml"
  pull_request:
    paths:
      - "rules/sigma/**/*.yml"
      - "rules/sigma/**/*.yaml"
      - "docs/schemas/sigma_schema.json"
      - "scripts/validate/**"
      - "scripts/convert/sigma_to_spl.py"
      - "scripts/deploy/deploy_spl_to_splunk.py"
      - "scripts/atomic/run_atomic.ps1"
      - "scripts/verify/**"
      - ".github/workflows/ci_sigma_validate_and_convert.yml"

concurrency:
  group: detection-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare_validate_convert:
    name: Prepare, Validate, Convert
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.changes.outputs.mode }}
      has_rules: ${{ steps.changes.outputs.has_rules }}
      has_spl: ${{ steps.bundle.outputs.has_spl }}
      rule_files: ${{ steps.changes.outputs.rule_files }}
      spl_files: ${{ steps.bundle.outputs.spl_files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine changed Sigma files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"

          git fetch --no-tags --prune --depth=0 origin || true

          mode="changed"

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            mode="all"
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=AMRC "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || true)

          if [[ "${#files[@]}" -gt 0 ]]; then
            echo "Changed files:"
            printf ' - %s\n' "${files[@]}"
          fi

          if [[ "$mode" != "all" ]]; then
            for f in "${files[@]}"; do
              if [[ "$f" == "docs/schemas/sigma_schema.json" ]] || [[ "$f" == scripts/validate/* ]] || [[ "$f" == "scripts/convert/sigma_to_spl.py" ]]; then
                mode="all"
                break
              fi
            done
          fi

          rule_files=()
          if [[ "$mode" == "all" ]]; then
            while IFS= read -r rf; do
              [[ -n "$rf" ]] && rule_files+=("$rf")
            done < <(git ls-files "rules/sigma/**/*.yml" "rules/sigma/**/*.yaml" || true)
          else
            for f in "${files[@]}"; do
              if [[ "$f" =~ ^rules/sigma/.*\.(yml|yaml)$ ]]; then
                rule_files+=("$f")
              fi
            done
          fi

          if [[ "${#rule_files[@]}" -eq 0 ]]; then
            echo "No Sigma rule files to process."
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "has_rules=false" >> "$GITHUB_OUTPUT"
            {
              echo "rule_files<<EOF"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Mode: $mode"
          echo "has_rules=true" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          {
            echo "rule_files<<EOF"
            printf '%s\n' "${rule_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Python deps
        if: steps.changes.outputs.has_rules == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema sigma-cli pysigma-backend-splunk

      - name: Validate Sigma rules
        if: steps.changes.outputs.has_rules == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $schemaPath = "docs/schemas/sigma_schema.json"
          $maxErrors = 25

          $rules = @'
          ${{ steps.changes.outputs.rule_files }}
          '@ -split "`r?`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          if ($rules.Count -eq 0) {
            Write-Host "No rule files to validate -> skipping."
            exit 0
          }

          Write-Host "Validating $($rules.Count) rule file(s) against schema."

          ./scripts/validate/validate_sigma.ps1 `
            -SchemaPath $schemaPath `
            -Files $rules `
            -MaxErrors $maxErrors

      - name: Convert Sigma rules to Splunk SPL
        if: steps.changes.outputs.has_rules == 'true'
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -t rules <<'EOF'
          ${{ steps.changes.outputs.rule_files }}
          EOF

          if [[ "${#rules[@]}" -eq 0 ]]; then
            echo "No rule files to convert -> skipping."
            exit 0
          fi

          mkdir -p rules/splunk
          python scripts/convert/sigma_to_spl.py --outdir rules/splunk "${rules[@]}"

      - name: Build pipeline bundle
        id: bundle
        if: steps.changes.outputs.has_rules == 'true'
        shell: bash
        run: |
          set -euo pipefail

          rm -rf pipeline_bundle
          mkdir -p pipeline_bundle/scripts/atomic pipeline_bundle/scripts/deploy

          cp scripts/atomic/run_atomic.ps1 pipeline_bundle/scripts/atomic/run_atomic.ps1
          cp scripts/deploy/deploy_spl_to_splunk.py pipeline_bundle/scripts/deploy/deploy_spl_to_splunk.py

          mapfile -t rules <<'EOF'
          ${{ steps.changes.outputs.rule_files }}
          EOF

          spl_files=()
          for rule in "${rules[@]}"; do
            [[ -z "$rule" ]] && continue

            name="$(basename "$rule")"
            name="${name%.yml}"
            name="${name%.yaml}"
            name="${name%.sigma}"

            spl_path="rules/splunk/${name}.sigma.spl"
            if [[ ! -f "$spl_path" ]]; then
              echo "Expected generated SPL file is missing: $spl_path"
              exit 1
            fi

            spl_files+=("$spl_path")
            mkdir -p "pipeline_bundle/$(dirname "$spl_path")"
            cp "$spl_path" "pipeline_bundle/$spl_path"
          done

          if [[ "${#spl_files[@]}" -eq 0 ]]; then
            echo "No generated SPL files found."
            echo "has_spl=false" >> "$GITHUB_OUTPUT"
            {
              echo "spl_files<<EOF"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Generated SPL files selected for deploy + atomic verify:"
          printf ' - %s\n' "${spl_files[@]}"

          echo "has_spl=true" >> "$GITHUB_OUTPUT"
          {
            echo "spl_files<<EOF"
            printf '%s\n' "${spl_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit converted SPL outputs to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          steps.bundle.outputs.has_spl == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git add -A rules/splunk

          if git diff --cached --quiet; then
            echo "No SPL changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore(splunk): update sigma-converted SPL outputs [skip ci]"

          for i in 1 2 3; do
            git fetch origin main
            git pull --rebase origin main || true
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push failed (attempt $i), retrying..."
            sleep 2
          done

          echo "Push failed after 3 attempts."
          exit 1

      - name: Upload pipeline bundle
        if: steps.bundle.outputs.has_spl == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: spl-pipeline-bundle
          path: pipeline_bundle
          if-no-files-found: error

  deploy_to_splunk:
    name: Deploy to Splunk
    needs: prepare_validate_convert
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.prepare_validate_convert.outputs.has_spl == 'true'
    runs-on: [ self-hosted, linux, de-lab ]

    steps:
      - name: Download pipeline bundle
        uses: actions/download-artifact@v4
        with:
          name: spl-pipeline-bundle
          path: pipeline_bundle

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deploy deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Deploy selected SPL files to Splunk
        shell: bash
        env:
          SPLUNK_BASE_URL: ${{ secrets.SPLUNK_BASE_URL }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
          SPLUNK_APP: ${{ secrets.SPLUNK_APP }}
          SPLUNK_OWNER: ${{ secrets.SPLUNK_OWNER }}
          SPLUNK_VERIFY_TLS: ${{ secrets.SPLUNK_VERIFY_TLS || 'false' }}
          SPLUNK_SHARING: app
          SPLUNK_PERMS_READ: "*"
          SPLUNK_PERMS_WRITE: admin,ci_deploy_savedsearches
        run: |
          set -euo pipefail

          mapfile -t spl_files <<'EOF'
          ${{ needs.prepare_validate_convert.outputs.spl_files }}
          EOF

          bundle_files=()
          for spl_file in "${spl_files[@]}"; do
            [[ -z "$spl_file" ]] && continue
            bundle_files+=("pipeline_bundle/$spl_file")
          done

          if [[ "${#bundle_files[@]}" -eq 0 ]]; then
            echo "No SPL files to deploy."
            exit 0
          fi

          python pipeline_bundle/scripts/deploy/deploy_spl_to_splunk.py "${bundle_files[@]}"

  atomic_verify:
    name: Atomic Red Team Test
    needs: [ prepare_validate_convert, deploy_to_splunk ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.prepare_validate_convert.outputs.has_spl == 'true'
    runs-on: [ self-hosted, X64, Windows, victim, atomic, windows-victim ]

    steps:
      - name: Download pipeline bundle
        uses: actions/download-artifact@v4
        with:
          name: spl-pipeline-bundle
          path: pipeline_bundle

      - name: Run Atomic Red Team tests embedded in deployed SPL metadata
        shell: powershell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass
          -Command ". '{0}'"
        env:
          ATOMIC_RUNNER: windows-victim
          ATOMIC_RED_TEAM_MODULE_PATH: ${{ vars.ATOMIC_RED_TEAM_MODULE_PATH }}
          ATOMIC_RED_TEAM_PATH: ${{ vars.ATOMIC_RED_TEAM_PATH }}
          ATOMIC_DISABLE_REALTIME_MONITORING: ${{ vars.ATOMIC_DISABLE_REALTIME_MONITORING || 'true' }}
        run: |
          $ErrorActionPreference = "Stop"

          $splFiles = @'
          ${{ needs.prepare_validate_convert.outputs.spl_files }}
          '@ -split "`r?`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          if ($splFiles.Count -eq 0) {
            Write-Host "No SPL files selected for Atomic verification."
            exit 0
          }

          $bundleSplFiles = $splFiles | ForEach-Object { Join-Path "pipeline_bundle" $_ }

          .\pipeline_bundle\scripts\atomic\run_atomic.ps1 -SplFiles $bundleSplFiles -PreflightOnly
          .\pipeline_bundle\scripts\atomic\run_atomic.ps1 -SplFiles $bundleSplFiles

  splunk_verify:
    name: Splunk Verification
    needs: [ prepare_validate_convert, atomic_verify ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.prepare_validate_convert.outputs.has_spl == 'true'
    runs-on: [ self-hosted, linux, de-lab ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download pipeline bundle
        uses: actions/download-artifact@v4
        with:
          name: spl-pipeline-bundle
          path: pipeline_bundle

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests pyyaml

      - name: Wait for Splunk indexing
        shell: bash
        run: |
          WAIT=${SPLUNK_VERIFY_WAIT_SECONDS:-60}
          echo "Waiting ${WAIT}s for Splunk to index atomic test events..."
          sleep "$WAIT"

      - name: Query Splunk for matched events
        id: fetch
        shell: bash
        env:
          SPLUNK_BASE_URL: ${{ secrets.SPLUNK_BASE_URL }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
          SPLUNK_APP: ${{ secrets.SPLUNK_APP }}
          SPLUNK_OWNER: ${{ secrets.SPLUNK_OWNER }}
          SPLUNK_VERIFY_TLS: ${{ secrets.SPLUNK_VERIFY_TLS || 'false' }}
        run: |
          set -euo pipefail

          mapfile -t spl_files <<'EOF'
          ${{ needs.prepare_validate_convert.outputs.spl_files }}
          EOF

          bundle_files=()
          for spl_file in "${spl_files[@]}"; do
            [[ -z "$spl_file" ]] && continue
            bundle_files+=("pipeline_bundle/$spl_file")
          done

          if [[ "${#bundle_files[@]}" -eq 0 ]]; then
            echo "No SPL files to verify."
            exit 0
          fi

          MATCHED_EVENTS_DIR=$(mktemp -d)
          echo "matched_events_dir=$MATCHED_EVENTS_DIR" >> "$GITHUB_ENV"

          python scripts/verify/check_saved_search_hits.py \
            --earliest="-5m" \
            --latest="now" \
            --output-dir "$MATCHED_EVENTS_DIR" \
            "${bundle_files[@]}"

      - name: Evaluate Pass/Fail
        id: eval
        shell: bash
        run: |
          set +e
          python scripts/verify/pass_fail_eval.py \
            --matched-events-dir "${{ env.matched_events_dir }}" \
            --results-dir "outputs/results" \
            --min-pass 1 \
            --max-pass 10 \
            --run-id "${{ github.run_id }}"
          EVAL_EXIT=$?
          echo "exit_code=$EVAL_EXIT" >> "$GITHUB_OUTPUT"

      - name: Upload matched events artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matched-events-sigma-${{ github.run_id }}
          path: ${{ env.matched_events_dir }}
          retention-days: 90
          if-no-files-found: ignore

      - name: Generate stats and update README
        shell: bash
        run: |
          set -euo pipefail
          python scripts/docs/generate_stats.py

      - name: Commit verification results and stats
        shell: bash
        env:
          GIT_EDITOR: ":"
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add outputs/results/ outputs/reports/stats.json README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(verify): update verification results and stats [skip ci]"

          for i in 1 2 3; do
            git fetch origin main

            if git rebase origin/main; then
              : # clean rebase, no conflict
            else
              # stats.json / README.md conflict: keep our generated version, continue
              git checkout --theirs outputs/reports/stats.json README.md 2>/dev/null || true
              git add outputs/reports/stats.json README.md 2>/dev/null || true
              git rebase --continue 2>/dev/null || {
                git rebase --abort 2>/dev/null || true
                echo "Rebase failed on attempt $i, retrying..."
                sleep 2
                continue
              }
            fi

            # Re-generate stats after rebase so it includes all pipelines' results
            python scripts/docs/generate_stats.py
            git add outputs/reports/stats.json README.md
            git diff --cached --quiet || git commit --amend --no-edit

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (attempt $i), retrying..."
            sleep 2
          done

          echo "Push failed after 3 attempts."
          exit 1

      - name: Report verification verdict
        shell: bash
        run: exit ${{ steps.eval.outputs.exit_code || '0' }}
