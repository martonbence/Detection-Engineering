name: CI - Atomic Red Team Verification

on:
  workflow_run:
    workflows: ["CI - Deploy SPL to Splunk"]
    types: [completed]

permissions:
  contents: read

jobs:
  Run-Atomic-Verification:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: [self-hosted, X64, Windows, victim, atomic, windows-victim]

    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Determine changed SPL files for atomic verification
        id: changes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $headSha = "${{ github.event.workflow_run.head_sha }}"
          $baseSha = ""

          try {
            $baseSha = (git rev-parse "$headSha^").Trim()
          }
          catch {
            $baseSha = ""
          }

          if ([string]::IsNullOrWhiteSpace($baseSha)) {
            Write-Host "No base commit available; selecting all SPL files."
            $splFiles = @(git ls-files "rules/splunk/**/*.spl" "rules/splunk/*.spl" | Where-Object { $_ -match '\.spl$' })
          }
          else {
            $files = @(git diff --name-only --diff-filter=AMRC $baseSha $headSha)
            $splFiles = @($files | Where-Object { $_ -match '^rules/splunk/.*\.spl$' })
          }

          if ($splFiles.Count -eq 0) {
            Write-Host "No changed SPL files to verify."
            "spl_files=" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          "spl_files<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $splFiles | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "Changed SPL files:"
          $splFiles | ForEach-Object { Write-Host " - $_" }

      - name: Run Atomic Red Team tests embedded in SPL metadata
        if: steps.changes.outputs.spl_files != ''
        shell: pwsh
        env:
          ATOMIC_RUNNER: windows-victim
          ATOMIC_RED_TEAM_MODULE_PATH: ${{ vars.ATOMIC_RED_TEAM_MODULE_PATH }}
          ATOMIC_RED_TEAM_PATH: ${{ vars.ATOMIC_RED_TEAM_PATH }}
          ATOMIC_DISABLE_REALTIME_MONITORING: ${{ vars.ATOMIC_DISABLE_REALTIME_MONITORING || 'false' }}
        run: |
          $ErrorActionPreference = "Stop"

          $splFiles = @'
          ${{ steps.changes.outputs.spl_files }}
          '@ -split "`r?`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          .\scripts\atomic\run_atomic.ps1 -SplFiles $splFiles -PreflightOnly
          .\scripts\atomic\run_atomic.ps1 -SplFiles $splFiles
